<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Document</title>
  </head>
  <body>
    <form id="survey-form">
      <h1 id="title">Survey Form</h1>
      <label id="name-label">Name</label>
      <input id="name" type="text" placeholder="Name" required />

      <label id="email-label">Email</label>
      <input id="email" type="email" placeholder="Email" required />

      <label id="number-label">Number</label>
      <input id="number" type="number" placeholder="Number" min="5" max="100" />
      <select id="dropdown">
        <option value=""></option>
        <option value=""></option>
      </select>
      <label>Experience Level</label>

      <div class="radio-group">
        <label>
          <input type="radio" name="level" value="junior" />
          Junior
        </label>

        <label>
          <input type="radio" name="level" value="senior" />
          Senior
        </label>
      </div>

      <label>Technologies</label>

      <div class="checkbox-group">
        <label>
          <input type="checkbox" value="html" />
          HTML
        </label>

        <label>
          <input type="checkbox" value="css" />
          CSS
        </label>
      </div>

      <label>Comments</label>
      <textarea placeholder="Tell us more about yourself"></textarea>

      <button type="submit">Submit Survey</button>
    </form>
  </body>
</html>
