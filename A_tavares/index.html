<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pizzaria Primo Tavares</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header-content">
        <a href="#"
          ><img
            class="logo"
            src="img/Pizzaria-Primo-Tavares.webp"
            alt="Logo da Pizzaria Primo Tavares"
        /></a>
        <nav class="nav" aria-label="Principal">
          <ul class="nav-list">
            <li><a href="#">Home</a></li>
            <li><a href="#">Menu</a></li>
            <li><a href="#">Promoções</a></li>
            <li>
              <span><a href="#">Pedidos</a></span>
            </li>
          </ul>
        </nav>
        <input
          class="search"
          type="search"
          placeholder="Pesquisar..."
          aria-label="Pesquisar"
        />
        <div class="contact">
          <div class="contact-icon">
            <img src="img/motoboy-removebg-preview.png" alt="Motoboy" />
          </div>
          <div>
            <p class="login">
              Login ou cadastre-se
              <img id="icon-pizza" src="img/icon_files/4.svg" alt="" />
            </p>
          </div>
        </div>
      </div>
    </header>
    <div class="address-bar">
      <div class="container">
        <img src="img/gps.png" alt="" /><a
          href="https://www.google.com/maps?cid=4367635661783473293&g_mp=CiVnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLkdldFBsYWNlEAMYASAF&hl=pt-BR&source=embed"
          >Endereço</a
        >
      </div>
    </div>
    <main class="hero">
      <div class="container hero-content">
        <p class="tag">Feito com amor</p>
        <h1>Fazemos a melhor <span>Pizza da Cidade</span></h1>
        <p>Ingredientes selecionados, massa artesanal e entrega rápida.</p>
        <a class="btn" href="#">Ver Cardápio</a>
      </div>
      <img class="pizza" src="img/pizza-removebg-preview.png" alt="" />
    </main>

    <footer>hello</footer>
  </body>
</html>
